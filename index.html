<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="manifest" href="/manifest.json" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#CC0000" />
    <link rel="apple-touch-icon" href="/icon-192.png" />
    <link rel="apple-touch-icon" sizes="512x512" href="/icon-512.png" />
    <meta name="description" content="Sales management portal for IndoorMedia representatives" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="IndoorMedia" />
    <title>IndoorMedia Rep Portal</title>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.js?v=20260330"></script>
    <script>
      // Register service worker for PWA functionality
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/IndoorMedia-pwa/sw.js?v=20260330').then(reg => {
            console.log('[App] Service Worker registered:', reg);
            // Force update check
            reg.update();
          }).catch(err => {
            console.error('[App] Service Worker registration failed:', err);
          });
        });
      }
    </script>
  </body>
</html>
