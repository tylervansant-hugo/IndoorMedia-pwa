<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <!-- Red rounded square background -->
  <rect x="10" y="10" width="180" height="180" rx="35" fill="#CC0000"/>
  
  <!-- White "iM" monogram with geometric/angular design -->
  <g fill="white">
    <!-- Lowercase "i" - vertical line with dot -->
    <line x1="70" y1="55" x2="70" y2="105" stroke="white" stroke-width="6" stroke-linecap="round"/>
    <circle cx="70" cy="48" r="4" fill="white"/>
    
    <!-- Uppercase "M" - geometric peaks -->
    <!-- Left diagonal up -->
    <line x1="85" y1="105" x2="100" y2="55" stroke="white" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/>
    <!-- Left diagonal down -->
    <line x1="100" y1="55" x2="115" y2="105" stroke="white" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/>
    <!-- Right diagonal up -->
    <line x1="115" y1="105" x2="130" y2="55" stroke="white" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/>
    <!-- Right diagonal down -->
    <line x1="130" y1="55" x2="145" y2="105" stroke="white" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/>
    <!-- Bottom horizontal -->
    <line x1="85" y1="105" x2="145" y2="105" stroke="white" stroke-width="6" stroke-linecap="round"/>
  </g>
  
  <!-- IndoorMedia text below -->
  <text x="100" y="140" font-family="Arial, Helvetica, sans-serif" font-size="18" font-weight="bold" fill="white" text-anchor="middle" letter-spacing="1">IndoorMedia</text>
</svg>
