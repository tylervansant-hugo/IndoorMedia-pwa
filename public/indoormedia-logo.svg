<svg viewBox="0 0 300 300" xmlns="http://www.w3.org/2000/svg">
  <!-- Red background -->
  <rect width="300" height="300" fill="#CC0000"/>
  
  <!-- Bright green oval border -->
  <ellipse cx="150" cy="120" rx="95" ry="75" fill="none" stroke="#7FD856" stroke-width="12" stroke-linecap="round"/>
  
  <!-- White "im" text (italic) -->
  <text x="150" y="135" font-family="Arial, Helvetica, sans-serif" font-size="72" font-weight="bold" fill="white" text-anchor="middle" font-style="italic">im</text>
  
  <!-- White "IndoorMedia" text below oval -->
  <text x="150" y="220" font-family="Arial, Helvetica, sans-serif" font-size="28" font-weight="500" fill="white" text-anchor="middle" font-style="italic" letter-spacing="1">IndoorMedia</text>
</svg>
