<svg viewBox="0 0 400 400" xmlns="http://www.w3.org/2000/svg">
  <!-- Red background -->
  <rect width="400" height="400" fill="#E84141"/>
  
  <!-- White 3D Isometric "IM" Logo -->
  <g fill="white">
    <!-- "I" - left parallelogram (front face) -->
    <polygon points="80,120 140,90 160,280 100,310" fill="white"/>
    
    <!-- "I" - top parallelogram (top face) -->
    <polygon points="80,120 140,90 150,110 90,140" fill="white" opacity="0.9"/>
    
    <!-- "I" - right parallelogram (right face) -->
    <polygon points="140,90 160,110 160,280 140,260" fill="white" opacity="0.8"/>
    
    <!-- "M" - left front parallelogram -->
    <polygon points="180,120 280,60 310,70 210,130" fill="white"/>
    
    <!-- "M" - left top parallelogram -->
    <polygon points="180,120 280,60 295,85 195,145" fill="white" opacity="0.9"/>
    
    <!-- "M" - left right face -->
    <polygon points="280,60 310,70 310,280 280,270" fill="white" opacity="0.8"/>
    
    <!-- "M" - middle front parallelogram (valley) -->
    <polygon points="295,95 330,80 350,260 315,275" fill="white"/>
    
    <!-- "M" - middle top parallelogram -->
    <polygon points="295,95 330,80 345,105 310,120" fill="white" opacity="0.9"/>
    
    <!-- "M" - right front parallelogram -->
    <polygon points="350,80 320,130 340,300 370,250" fill="white"/>
    
    <!-- "M" - right top parallelogram -->
    <polygon points="350,80 320,130 335,155 365,105" fill="white" opacity="0.9"/>
  </g>
  
  <!-- "IndoorMedia" Text - italic script style -->
  <text x="200" y="350" font-family="Arial, Helvetica, sans-serif" font-size="56" font-weight="300" fill="white" text-anchor="middle" font-style="italic" letter-spacing="2">IndoorMedia</text>
</svg>
